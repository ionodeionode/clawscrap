<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>ClawScrap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 340px;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .logo {
            font-size: 24px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .header .version {
            font-size: 11px;
            color: #94a3b8;
            margin-left: auto;
        }

        .status-bar {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #2a2a4a;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s;
        }

        .status-dot.active {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
            animation: pulse 2s infinite;
        }

        .status-dot.processing {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .status-dot.connecting {
            background: #3b82f6;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            font-size: 13px;
            color: #94a3b8;
        }

        .content {
            padding: 16px 20px;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: #3b82f6;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        button {
            flex: 1;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .info-box {
            margin-top: 14px;
            padding: 10px 14px;
            background: #16213e;
            border-radius: 6px;
            border-left: 3px solid #3b82f6;
        }

        .info-box .info-line {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 2px 0;
        }

        .info-box .info-label {
            color: #94a3b8;
        }

        .info-box .info-value {
            color: #e0e0e0;
            font-family: 'SF Mono', monospace;
        }

        .info-value.connected {
            color: #22c55e;
        }

        .info-value.disconnected {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="icons/icon48.png" style="width:28px;height:28px;object-fit:contain;" />
        <h1>ClawScrap</h1>
        <span class="version">v2.0</span>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Connecting...</span>
    </div>

    <div class="content">
        <div class="field">
            <label>ClawBridge Server URL</label>
            <input type="text" id="serverUrl" placeholder="http://localhost:3002" />
        </div>

        <div class="field">
            <label>API Key (optional)</label>
            <input type="password" id="apiKey" placeholder="Leave empty if no auth" />
        </div>

        <div class="actions">
            <button class="btn-primary" id="btnStart">▶ Connect</button>
            <button class="btn-danger" id="btnStop">■ Disconnect</button>
        </div>

        <div class="info-box">
            <div class="info-line">
                <span class="info-label">Bridge</span>
                <span class="info-value" id="infoBridge">—</span>
            </div>
            <div class="info-line">
                <span class="info-label">Polling</span>
                <span class="info-value" id="infoPolling">—</span>
            </div>
            <div class="info-line">
                <span class="info-label">Processing</span>
                <span class="info-value" id="infoProcessing">—</span>
            </div>
            <div class="info-line">
                <span class="info-label">Server</span>
                <span class="info-value" id="infoServer">—</span>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
